{% extends "base.html" %}
{% block title %}Forgot Password — Blissful Abodes{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;background:var(--gradient-hero);padding:2rem;">
    <div style="max-width:420px;width:100%;margin:auto;background:white;border-radius:24px;padding:2.5rem;box-shadow:var(--shadow-xl);">
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="font-size:3rem;">🔑</div>
            <h2>Forgot Password?</h2>
            <p style="color:var(--text-light);font-size:0.9rem;">Enter your email to receive a reset OTP</p>
        </div>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">📧 Send OTP</button>
        </form>
        <p style="text-align:center;font-size:0.875rem;margin-top:1rem;"><a href="{{ url_for('auth.login') }}" style="color:var(--primary);">← Back to Login</a></p>
    </div>
</div>
{% endblock %}
{% block footer %}{% endblock %}
