{% extends "base.html" %}
{% block title %}Reset Password — Blissful Abodes{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;background:var(--gradient-hero);padding:2rem;">
    <div style="max-width:420px;width:100%;margin:auto;background:white;border-radius:24px;padding:2.5rem;box-shadow:var(--shadow-xl);">
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="font-size:3rem;">🔓</div>
            <h2>Reset Password</h2>
            <p style="color:var(--text-light);font-size:0.9rem;">Enter the OTP sent to your email</p>
        </div>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label">6-Digit OTP</label>
                <input type="text" name="otp" class="form-control" placeholder="••• •••" maxlength="6" style="font-size:1.5rem;letter-spacing:0.5rem;text-align:center;" required>
                <small style="color:var(--text-light);font-size:0.78rem;">Valid for 10 minutes</small>
            </div>
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password" class="form-control" placeholder="Min. 8 characters" required minlength="8">
            </div>
            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Repeat new password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">✅ Reset Password</button>
        </form>
    </div>
</div>
{% endblock %}
{% block footer %}{% endblock %}
