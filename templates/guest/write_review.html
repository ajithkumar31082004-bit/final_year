{% extends "base.html" %}
{% block title %}Write Review - Blissful Abodes{% endblock %}
{% block content %}
<div style="background:var(--gradient-dark);padding:3rem 0;text-align:center;">
  <h1 style="color:white;font-family:var(--font-heading);">Write a Review</h1>
  <p style="color:rgba(255,255,255,0.7);">Share your experience and earn 50 loyalty points</p>
</div>
<section style="padding:3rem 0;background:var(--bg-cream);">
  <div class="container-sm">
    <div class="card">
      <div class="card-header"><span>Review for Booking {{ booking.booking_id }}</span></div>
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="form-group">
            <label class="form-label">Overall Rating</label>
            <select name="rating" class="form-control">
              <option value="5">5 - Excellent</option>
              <option value="4">4 - Great</option>
              <option value="3">3 - Good</option>
              <option value="2">2 - Fair</option>
              <option value="1">1 - Poor</option>
            </select>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="form-group"><label class="form-label">Cleanliness</label><select name="cleanliness" class="form-control"><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
            <div class="form-group"><label class="form-label">Staff</label><select name="staff" class="form-control"><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
            <div class="form-group"><label class="form-label">Location</label><select name="location" class="form-control"><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
            <div class="form-group"><label class="form-label">Value</label><select name="value" class="form-control"><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
            <div class="form-group"><label class="form-label">Amenities</label><select name="amenities_rating" class="form-control"><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
          </div>
          <div class="form-group">
            <label class="form-label">Comments</label>
            <textarea name="comment" class="form-control" rows="4" placeholder="Tell us what you loved or what we can improve" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Submit Review</button>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
