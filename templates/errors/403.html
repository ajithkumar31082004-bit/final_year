<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>403 — Access Denied</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#1A1A2E,#16213E,#0F3460);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;color:white;margin:0;}
.container{max-width:500px;padding:2rem;}
h1{font-family:'Playfair Display',serif;font-size:2.5rem;margin:0 0 1rem;}
p{color:rgba(255,255,255,0.7);margin-bottom:2rem;}
.btn{display:inline-flex;align-items:center;gap:0.5rem;background:linear-gradient(135deg,#FF6B35,#E55A2B);color:white;padding:0.75rem 2rem;border-radius:50px;text-decoration:none;font-weight:600;}
</style></head>
<body>
<div class="container">
    <div style="font-size:6rem;margin-bottom:1rem;">🔐</div>
    <h1>Access Denied</h1>
    <p>You don't have permission to access this area. Please login with appropriate credentials.</p>
    <a href="/auth/login" class="btn">🔑 Login</a>
</div>
</body></html>
