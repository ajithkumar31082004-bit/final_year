<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#E5F2FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="60" y="70" font-size="40" font-family="Arial, sans-serif" fill="#1A1A2E">Demand Forecasting Model</text>
  <text x="60" y="110" font-size="20" font-family="Arial, sans-serif" fill="#4A4A6A">Simulated LSTM with seasonality and smoothing</text>

  <rect x="60" y="160" width="360" height="160" rx="16" fill="#FFFFFF" stroke="#17A2B8" stroke-width="2"/>
  <text x="90" y="205" font-size="20" font-family="Arial, sans-serif" fill="#1A1A2E">Inputs</text>
  <text x="90" y="240" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Historical baseline (365d)</text>
  <text x="90" y="270" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Seasonality: peak/high/low</text>
  <text x="90" y="300" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Weekend boost</text>

  <rect x="480" y="170" width="260" height="140" rx="16" fill="#FFFFFF" stroke="#FF6B35" stroke-width="2"/>
  <text x="505" y="215" font-size="20" font-family="Arial, sans-serif" fill="#1A1A2E">Noise + EMA</text>
  <text x="505" y="245" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Deterministic jitter</text>
  <text x="505" y="275" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Smoothing curve</text>

  <rect x="820" y="150" width="320" height="220" rx="16" fill="#FFFFFF" stroke="#28A745" stroke-width="2"/>
  <text x="850" y="195" font-size="20" font-family="Arial, sans-serif" fill="#1A1A2E">Output</text>
  <text x="850" y="230" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">30-day demand curve</text>
  <text x="850" y="260" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Occupancy projection</text>
  <text x="850" y="290" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Admin planning signals</text>

  <polyline points="120,520 220,460 320,480 420,420 520,440 620,390 720,410 820,360 920,380 1020,340" fill="none" stroke="#FF6B35" stroke-width="4"/>
  <text x="60" y="560" font-size="16" font-family="Arial, sans-serif" fill="#4A4A6A">Example forecast curve</text>

  <line x1="420" y1="240" x2="480" y2="240" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="740" y1="240" x2="820" y2="240" stroke="#1A1A2E" stroke-width="2"/>
</svg>
