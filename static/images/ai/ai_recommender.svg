<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#E7F7F0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="60" y="70" font-size="40" font-family="Arial, sans-serif" fill="#1A1A2E">Hybrid Recommendation System</text>
  <text x="60" y="110" font-size="20" font-family="Arial, sans-serif" fill="#4A4A6A">Weighted blend of three signals</text>

  <rect x="60" y="170" width="320" height="160" rx="16" fill="#FFFFFF" stroke="#17A2B8" stroke-width="2"/>
  <text x="90" y="215" font-size="20" font-family="Arial, sans-serif" fill="#1A1A2E">Collaborative (40%)</text>
  <text x="90" y="245" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Similar guest patterns</text>

  <rect x="60" y="360" width="320" height="160" rx="16" fill="#FFFFFF" stroke="#FF6B35" stroke-width="2"/>
  <text x="90" y="405" font-size="20" font-family="Arial, sans-serif" fill="#1A1A2E">Content (35%)</text>
  <text x="90" y="435" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Room feature vectors</text>

  <rect x="420" y="260" width="320" height="160" rx="16" fill="#FFFFFF" stroke="#D4AF37" stroke-width="2"/>
  <text x="450" y="305" font-size="20" font-family="Arial, sans-serif" fill="#1A1A2E">Context (25%)</text>
  <text x="450" y="335" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Season, tier, stay length</text>

  <rect x="820" y="250" width="320" height="180" rx="16" fill="#FFFFFF" stroke="#28A745" stroke-width="2"/>
  <text x="850" y="295" font-size="20" font-family="Arial, sans-serif" fill="#1A1A2E">Recommendations</text>
  <text x="850" y="330" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Top rooms with scores</text>
  <text x="850" y="360" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Explainable reasons</text>

  <line x1="380" y1="250" x2="420" y2="310" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="380" y1="440" x2="420" y2="350" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="740" y1="330" x2="820" y2="330" stroke="#1A1A2E" stroke-width="2"/>
</svg>
