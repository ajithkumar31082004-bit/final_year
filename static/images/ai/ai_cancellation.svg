<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#FFE8E8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="60" y="70" font-size="40" font-family="Arial, sans-serif" fill="#1A1A2E">Cancellation Prediction</text>
  <text x="60" y="110" font-size="20" font-family="Arial, sans-serif" fill="#4A4A6A">Logistic-inspired probability scoring</text>

  <rect x="60" y="160" width="380" height="220" rx="16" fill="#FFFFFF" stroke="#DC3545" stroke-width="2"/>
  <text x="90" y="205" font-size="20" font-family="Arial, sans-serif" fill="#1A1A2E">Signals</text>
  <text x="90" y="240" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Days until check-in</text>
  <text x="90" y="270" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Price sensitivity</text>
  <text x="90" y="300" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Past cancellations</text>
  <text x="90" y="330" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Season and room type</text>

  <rect x="500" y="200" width="240" height="140" rx="16" fill="#FFFFFF" stroke="#FF6B35" stroke-width="2"/>
  <text x="530" y="245" font-size="20" font-family="Arial, sans-serif" fill="#1A1A2E">Sigmoid</text>
  <text x="530" y="275" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Score to probability</text>

  <rect x="820" y="170" width="320" height="200" rx="16" fill="#FFFFFF" stroke="#28A745" stroke-width="2"/>
  <text x="850" y="215" font-size="20" font-family="Arial, sans-serif" fill="#1A1A2E">Risk Levels</text>
  <text x="850" y="250" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Low: <35%</text>
  <text x="850" y="280" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Medium: 35-60%</text>
  <text x="850" y="310" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">High: >60%</text>

  <line x1="440" y1="260" x2="500" y2="260" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="740" y1="260" x2="820" y2="260" stroke="#1A1A2E" stroke-width="2"/>
</svg>
