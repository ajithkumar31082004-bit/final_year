<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#FFF4CC"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="60" y="70" font-size="40" font-family="Arial, sans-serif" fill="#1A1A2E">Dynamic Pricing Engine</text>
  <text x="60" y="110" font-size="20" font-family="Arial, sans-serif" fill="#4A4A6A">Five demand factors drive price</text>

  <rect x="60" y="160" width="420" height="240" rx="16" fill="#FFFFFF" stroke="#FF6B35" stroke-width="2"/>
  <text x="90" y="205" font-size="20" font-family="Arial, sans-serif" fill="#1A1A2E">Factors</text>
  <text x="90" y="240" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Occupancy</text>
  <text x="90" y="270" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Seasonality</text>
  <text x="90" y="300" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Day of week</text>
  <text x="90" y="330" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Last-minute / Early bird</text>
  <text x="90" y="360" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Room type elasticity</text>

  <rect x="540" y="200" width="240" height="160" rx="16" fill="#FFFFFF" stroke="#D4AF37" stroke-width="2"/>
  <text x="570" y="245" font-size="20" font-family="Arial, sans-serif" fill="#1A1A2E">Pricing Output</text>
  <text x="570" y="280" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Dynamic price</text>
  <text x="570" y="310" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Reason tags</text>

  <rect x="840" y="180" width="300" height="200" rx="16" fill="#FFFFFF" stroke="#28A745" stroke-width="2"/>
  <text x="870" y="225" font-size="20" font-family="Arial, sans-serif" fill="#1A1A2E">Tags</text>
  <text x="870" y="260" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">High demand surge</text>
  <text x="870" y="290" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Special rate discount</text>
  <text x="870" y="320" font-size="18" font-family="Arial, sans-serif" fill="#4A4A6A">Pricing reason</text>

  <line x1="480" y1="280" x2="540" y2="280" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="780" y1="280" x2="840" y2="280" stroke="#1A1A2E" stroke-width="2"/>
</svg>
